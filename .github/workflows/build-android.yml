name: Build Stilla APK

# Runs automatically on every push, and you can also start it by hand
# from the Actions tab (the "Run workflow" button).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build the web app
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add the Android platform
        run: npx cap add android

      - name: Sync Capacitor into Android
        run: npx cap sync android

      - name: Build the debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: Stilla-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
